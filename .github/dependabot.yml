version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github_actions"
      - "auto-merge"
    groups:
      github-actions:
        patterns:
          - "*"
    auto-merge:
      enable: true
      condition: "ci-success && no-breaking-change"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Deno/Node dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "Tuesday"
      time: "09:00"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "increase"
    auto-merge:
      enable: true
      condition: "ci-success"
    commit-message:
      prefix: "chore(deps)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    auto-merge:
      enable: false
