name: Security Scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "1.x"

      - name: Dependency Check
        run: deno info main.ts

      - name: Check for secrets
        run: |
          ! grep -R "PASSWORD\|SECRET\|TOKEN" . || (echo "Secrets detected" && exit 1)
