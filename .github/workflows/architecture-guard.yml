name: Architecture Guard (STRICT)

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Verify Architecture Rules (AST Engine)
        run: deno run --allow-read --allow-env scripts/architecture/engine.ts

      - name: Type Check
        run: deno check src/main.ts
