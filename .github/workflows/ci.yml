name: GFOS Deno CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 1.x

      # ⚡ Cache Deno dependencies
      - name: Cache Deno
        run: deno cache main.ts

      # 🔍 Format check
      - name: Format Check
        run: deno fmt --check

      # 🔍 Lint
      - name: Lint
        run: deno lint

      # 🧪 Tests
      - name: Test
        run: deno test --allow-all
