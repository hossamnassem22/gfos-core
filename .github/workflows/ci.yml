name: GFOS Optimized CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality (fmt + lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 1.x

      - name: Cache Dependencies
        run: deno cache main.ts

      - name: Format Check
        run: deno fmt --check

      - name: Lint
        run: deno lint


  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 1.x

      - name: Cache Dependencies
        run: deno cache main.ts

      - name: Run Tests
        run: deno test --allow-all --parallel
