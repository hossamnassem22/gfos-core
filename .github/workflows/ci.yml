name: CI

on:
  push:
    branches: [ main, dev/*, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  deno-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}

      - name: Run deno lint
        run: deno lint

      - name: Run deno tests (non-db)
        run: deno test --allow-all --filter "^(?!.*\bdb\b).*"

  db-tests:
    runs-on: ubuntu-latest
    needs: deno-lint-test
    if: ${{ secrets.DATABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x ./scripts/migrate.sh || true
          ./scripts/migrate.sh
      - name: Run deno tests (db)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: deno test --allow-all
