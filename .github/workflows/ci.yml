name: GFOS Enterprise CI v2

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

env:
  DENO_VERSION: "1.x"
  COVERAGE_MIN: "80"

jobs:

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - run: deno fmt --check
      - run: deno lint


  test:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - run: deno test --allow-all --parallel


  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - run: deno test --coverage=coverage --allow-all
      - run: deno coverage coverage --lcov > coverage.lcov

      - name: Coverage Gate
        run: |
          COVERAGE=$(deno coverage coverage | grep -oP '\d+(\.\d+)?' | head -1 || echo 0)
          echo "Coverage: $COVERAGE"
          if (( $(echo "$COVERAGE < $COVERAGE_MIN" | bc -l) )); then
            echo "Coverage below threshold"
            exit 1
          fi


  build:
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - run: deno cache main.ts
      - run: deno compile -o dist/app main.ts

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/


  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Create Release Metadata
        run: |
          echo "Release ${GITHUB_REF_NAME}" > release.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.txt
