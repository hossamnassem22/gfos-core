name: GFOS Production CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DENO_VERSION: "1.x"
  COVERAGE_MIN: "80"

jobs:

  quality:
    name: Quality Gate (fmt + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno
        run: deno cache main.ts

      - name: Format Check
        run: deno fmt --check

      - name: Lint
        run: deno lint


  test-matrix:
    name: Test Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno
        run: deno cache main.ts

      - name: Run Tests
        run: deno test --allow-all --parallel


  coverage:
    name: Coverage Enforcement
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run Coverage
        run: |
          deno test --coverage=coverage --allow-all
          deno coverage coverage --lcov > coverage.lcov

      - name: Enforce Coverage Threshold
        run: |
          COVERAGE=$(deno coverage coverage | grep -oP '\d+(\.\d+)?' | head -1)
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < $COVERAGE_MIN" | bc -l) )); then
            echo "Coverage below threshold ($COVERAGE_MIN%)"
            exit 1
          fi


  benchmark:
    name: Performance Benchmark (optional)
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run Benchmarks
        run: deno test --allow-all --filter=benchmark || true


  security:
    name: Security Scan (lightweight)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Audit Dependencies
        run: deno info main.ts
