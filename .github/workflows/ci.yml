name: GFOS Enterprise Deno CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DENO_VERSION: "1.x"

jobs:

  quality:
    name: Quality Gate (fmt + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache
        run: deno cache main.ts

      - name: Format Check
        run: deno fmt --check

      - name: Lint
        run: deno lint


  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache
        run: deno cache main.ts

      - name: Run Unit Tests
        run: deno test --allow-all --parallel


  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run Coverage
        run: |
          deno test --coverage=coverage --allow-all
          deno coverage coverage --lcov > coverage.lcov


  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run Benchmark Tests
        run: deno test --allow-all --filter=benchmark || true
