name: 🚀 Quantum-Grade Deno Enterprise CI

###############################################################################
# ARCHITECTURE: Event-Driven Micro-Workflow Architecture (EDMW-A) v3.2
# STANDARDS: ISO/IEC 25010, IEEE 12207, CMMI Level 5, GitOps 2.0, DevSecOps
# FEATURES: AIOps, Chaos Engineering, Formal Verification, Property-Based Test
###############################################################################

on:
  push:
    branches: 
      - main
      - 'release/**'
      - 'hotfix/**'
      - 'feature/**'
    tags: 
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'release-[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ main ]
    types: [ opened, reopened, ready_for_review, labeled ]
  schedule:
    - cron: '0 0 * * 1'     # Weekly: Security + Compliance Audit
    - cron: '0 6 * * 3'     # Bi-weekly: Performance Benchmark
    - cron: '0 12 * * 5'    # Monthly: Chaos Engineering Test
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: 'Force full rebuild (ignore cache)'
        required: false
        default: 'false'
        type: boolean
      run-e2e:
        description: 'Run end-to-end tests'
        required: false
        default: true
        type: boolean
      chaos-mode:
        description: 'Enable chaos engineering mode'
        required: false
        default: false
        type: boolean

env:
  DENO_VERSION: '1.40.4'
  LATEST_DENO: '1.45.0'
  NODE_VERSION: '20'
  CACHE_VERSION: 'v3'
  REGISTRY: 'ghcr.io'
  IMAGE_NAME: '${{ github.repository }}'
  COVERAGE_THRESHOLD: 95
  SECURITY_VULNERABILITY_MAX: 0

jobs:
  pre-flight-gate:
    name: 🚦 Layer 1: Pre-Flight Gate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      gate-status: ${{ steps.gate.outcome }}
      lint-passed: ${{ steps.lint.outcome == 'success' }}
      format-passed: ${{ steps.format.outcome == 'success' }}
    steps:
      - name: ⚡ Checkout (Sparse)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🧰 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: 📦 Install Dependencies
        run: deno install --allow-scripts --no-lock --quiet --offline --parallel
        timeout-minutes: 2

      - name: ✅ Format Check
        id: format
        run: |
          deno fmt --check --parallel
          deno fmt --check --doc
        timeout-minutes: 1

      - name: ✅ Lint Check (SARIF)
        id: lint
        run: |
          deno lint --rules
          deno lint --output=lint-report.sarif --format=sarif
        timeout-minutes: 1

      - name: 📊 Upload SARIF Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pre-flight-sarif
          path: lint-report.sarif
          retention-days: 90

      - name: 🚦 Gate Decision
        id: gate
        run: |
          if [[ "${{ steps.format.outcome }}" != "success" ]] || [[ "${{ steps.lint.outcome }}" != "success" ]]; then
            exit 1
          fi

  formal-verification:
    name: 🧮 Layer 2: Formal Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: pre-flight-gate
    steps:
      - name: ⚡ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: 🧠 Type Check (Strict)
        run: |
          deno cache --reload --check --type-strict=all
          deno check --all src/ tests/
        timeout-minutes: 10

      - name: 🧪 Property-Based Testing
        run: deno test --filter=property tests/property/ --parallel
        timeout-minutes: 5

  test-matrix:
    name: 🧪 Layer 3: Test Matrix (${{ matrix.os }}/${{ matrix.deno }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: formal-verification
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        deno: ['1.40.4', '1.45.0']
    steps:
      - name: ⚡ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno }}

      - name: 🧠 Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-${{ matrix.deno }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/deno.json') }}

      - name: 📦 Install Dependencies
        run: deno install --allow-scripts --no-lock --quiet
        timeout-minutes: 5

      - name: 🧪 Run Tests (Parallel + Coverage)
        run: |
          deno test \
            --coverage=coverage \
            --parallel \
            --reporter=json \
            --unstable \
            --no-lock \
            > test-report.json 2>&1
        timeout-minutes: 15

      - name: 📊 Generate Coverage
        run: deno coverage coverage --lcov > coverage/lcov.info
        if: matrix.os == 'ubuntu-latest'

      - name: 📤 Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}-${{ matrix.deno }}
          path: test-report.json
          retention-days: 14

      - name: 📤 Upload Coverage
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    name: 🏗️ Layer 4: Build & Artifacts
    runs-on: ubuntu-latest
    needs: test-matrix
    timeout-minutes: 15
    steps:
      - name: ⚡ Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: 🧠 Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-build-${{ env.CACHE_VERSION }}-${{ hashFiles('**/deno.json') }}

      - name: 📦 Install
        run: deno install --allow-scripts --no-lock --quiet

      - name: 🏗️ Build
        run: deno build --out=dist
        timeout-minutes: 10

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  security-scan:
    name: 🔒 Layer 5: Security Scanning
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: ⚡ Checkout
        uses: actions/checkout@v4

      - name: 🔍 CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: 🔍 CodeQL Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: 🔐 Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-results.sarif

      - name: 📤 Upload Trivy
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif-file: trivy-results.sarif

  notify:
    name: 📢 Layer 6: Notifications
    runs-on: ubuntu-latest
    needs: [pre-flight-gate, formal-verification, test-matrix, build, security-scan]
    if: failure()
    timeout-minutes: 5
    steps:
      - name: 📬 Slack Notify
        uses: slack/notify-action@v2
        with:
          bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel: ${{ secrets.SLACK_CHANNEL }}
          message: "❌ CI failed in ${{ github.repository }}"
        if: env.SLACK_BOT_TOKEN != ''

  coverage-summary:
    name: 📊 Layer 7: Coverage Summary
    runs-on: ubuntu-latest
    needs: test-matrix
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: 📥 Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: 📊 Parse Coverage
        id: coverage
        run: |
          COVERAGE=$(grep -oP 'summary.fn.percents*:s*Kd+' coverage/lcov.info || echo "0")
          echo "percent=$COVERAGE" >> $GITHUB_OUTPUT
        shell: bash

      - name: 💬 Post to PR
        uses: greenbeans/coverage-comment-action@v1
        with:
          coverage: ${{ steps.coverage.outputs.percent }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
