name: 🚀 Semantic Auto-Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  semantic-version:
    name: 🏷️ Semantic Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release-type: ${{ steps.version.outputs.release_type }}
    steps:
      - name: ⚡ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Calculate Version
        id: version
        uses: cycjim/semantic-release-action@v3
        with:
          tag_format: v%s

  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: semantic-version
    if: needs.semantic-version.outputs.release-type != 'none'
    steps:
      - name: ⚡ Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '1.40.4'

      - name: 🏗️ Build
        run: deno build --out=dist

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.semantic-version.outputs.version }}
          name: Release v${{ needs.semantic-version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📤 Publish to Deno
        run: deno publish
        env:
          DENO_AUTH_TOKEN: ${{ secrets.DENO_TOKEN }}
