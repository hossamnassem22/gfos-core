name: Architecture Policy Enforcement

on:
  pull_request:
  push:
    branches: [ main, refactor/**, feature/** ]

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Architecture Policy Guard
        run: |
          chmod +x scripts/guards/architecture-guard.sh
          ./scripts/guards/architecture-guard.sh
