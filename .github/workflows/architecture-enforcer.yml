name: Architecture Enforcer

on:
  push:
  pull_request:

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Architecture Engine
        run: deno run --allow-read scripts/guards/architecture-engine.ts

      - name: Run Database Guard
        run: deno run --allow-read scripts/guards/no-relative-database.ts

      - name: Type Check
        run: deno check src/main.ts
