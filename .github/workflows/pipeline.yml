name: GFOS Enterprise Pipeline (Orchestrator)

on:
  push:
    branches: [ main, refactor/**, feature/** ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # 1. CODE QUALITY STAGE
  # =========================
  quality:
    uses: ./.github/workflows/quality.yml

  # =========================
  # 2. TEST STAGE
  # =========================
  test:
    needs: quality
    uses: ./.github/workflows/test-suite.yml

  # =========================
  # 3. DATABASE SAFETY
  # =========================
  db_guard:
    needs: quality
    uses: ./.github/workflows/db-guard.yml

  # =========================
  # 4. SECURITY SCAN
  # =========================
  security:
    needs: test
    uses: ./.github/workflows/security.yml

  # =========================
  # 5. BUILD VALIDATION
  # =========================
  build:
    needs: [test, security]
    uses: ./.github/workflows/build.yml

