version: "3.9"

services:
  gfos-core:
    build: ..
    ports:
      - "3000:3000"
    environment:
      - ENV=production
      - DB_URL=postgres://user:pass@db:5432/gfos
      - JWT_SECRET=supersecret
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: gfos
    ports:
      - "5432:5432"
