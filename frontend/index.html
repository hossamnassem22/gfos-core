<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selfni Core</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; }
    .center { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; width: 100%; max-width: 500px; }
    input, select { width: 100%; padding: 10px 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 14px; }
    label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 13px; }
    .btn { width: 100%; padding: 12px; background: #0ea5e9; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 4px; }
    .btn:hover { background: #0284c7; }
    .btn-sm { padding: 8px 16px; background: #334155; color: #f1f5f9; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-blue { background: #0ea5e9; color: #fff; }
    .error { color: #ef4444; text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 20px; }
    .success { color: #22c55e; margin-bottom: 12px; font-size: 14px; }
    .page { padding: 16px; max-width: 700px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h2 { font-size: 20px; color: #38bdf8; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .tile { background: #1e293b; border-radius: 12px; padding: 28px 16px; text-align: center; cursor: pointer; border: 2px solid transparent; font-size: 16px; color: #f1f5f9; transition: border-color 0.2s; }
    .tile:hover { border-color: #0ea5e9; }
    .tile .icon { font-size: 28px; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px; border-bottom: 1px solid #334155; text-align: center; }
    th { color: #94a3b8; font-weight: 500; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .badge-active { background: #064e3b; color: #22c55e; }
    .badge-closed { background: #1e293b; color: #94a3b8; }
    .badge-restructured { background: #1c1917; color: #f59e0b; }
    .debt-card { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .summary-item { background: #0f172a; border-radius: 8px; padding: 12px; text-align: center; }
    .summary-item .val { font-size: 20px; color: #38bdf8; font-weight: bold; }
    .summary-item .lbl { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .notif-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; text-align: center; line-height: 18px; display: none; }
    .notif-btn { position: relative; display: inline-block; }
    .notif-item { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-right: 3px solid #0ea5e9; cursor: pointer; transition: opacity 0.2s; }
    .notif-item.read { border-right-color: #334155; opacity: 0.6; }
    .notif-item .notif-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .notif-item .notif-body { color: #94a3b8; font-size: 13px; }
    .notif-item .notif-date { color: #475569; font-size: 11px; margin-top: 4px; }
    .new-tag { background: #0ea5e9; color: #fff; border-radius: 4px; padding: 1px 6px; font-size: 11px; margin-left: 6px; }
    .customer-card { background: #0f172a; border-radius: 8px; padding: 14px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.2s; }
    .customer-card:hover { border-color: #334155; }
    .overdue-tag { color: #ef4444; font-size: 12px; margin-top: 4px; }
    .stat-card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .stat-card h3 { color: #94a3b8; font-size: 13px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #334155; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #94a3b8; font-size: 13px; }
    .stat-value { font-weight: bold; font-size: 15px; }
    .forecast-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-radius: 6px; margin-bottom: 4px; background: #0f172a; }
  </style>
</head>
<body>

<div id="login" class="center">
  <div class="card">
    <h2 style="color:#38bdf8;text-align:center;margin-bottom:24px;font-size:24px">Selfni Core</h2>
    <div id="login-error" class="error"></div>
    <label>البريد الالكتروني</label>
    <input id="email" type="email" placeholder="hossam@selfni.com">
    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="••••••••">
    <button class="btn" onclick="login()">دخول</button>
  </div>
</div>

<div id="dashboard" class="page" style="display:none">
  <div class="header">
    <h2>Selfni Core</h2>
    <div class="header-actions">
      <div class="notif-btn">
        <button class="btn-sm" onclick="loadNotifications()">🔔
          <span id="notif-badge" class="notif-badge"></span>
        </button>
      </div>
      <button class="btn-sm btn-danger" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="grid">
    <div class="tile" onclick="loadCustomers()"><div class="icon">👥</div>العملاء</div>
    <div class="tile" onclick="loadAnalytics()"><div class="icon">📊</div>التحليلات</div>
    <div class="tile" onclick="showView('new-debt')"><div class="icon">➕</div>دين جديد</div>
    <div class="tile" onclick="loadStatement()"><div class="icon">📋</div>كشف الحساب</div>
    <div class="tile" onclick="showView('calc-waterfall')"><div class="icon">💧</div>توزيع دفعة</div>
    <div class="tile" onclick="showView('calc-interest')"><div class="icon">📈</div>حساب فائدة</div>
    <div class="tile" onclick="loadOverdue()" style="border-color:#ef4444"><div class="icon">🔴</div>الاقساط المتاخرة</div>
  </div>
</div>

<div id="analytics" class="page" style="display:none">
  <div class="header">
    <h2>📊 التحليلات</h2>
    <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
  </div>
  <div id="analytics-content"></div>
</div>

<div id="customers" class="page" style="display:none">
  <div class="header">
    <h2>👥 العملاء</h2>
    <div class="header-actions">
      <button class="btn-sm btn-blue" onclick="showView('new-customer')">+ عميل جديد</button>
      <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
    </div>
  </div>
  <div id="customers-content"></div>
</div>

<div id="new-customer" class="page" style="display:none">
  <div class="header">
    <h2>➕ عميل جديد</h2>
    <button class="btn-sm" onclick="showView('customers')">رجوع</button>
  </div>
  <div class="card" style="max-width:100%">
    <div id="nc-error" class="error"></div>
    <label>الاسم</label><input id="nc-name" type="text" placeholder="احمد محمد">
    <label>الهاتف</label><input id="nc-phone" type="text" placeholder="01012345678">
    <label>الرقم القومي (اختياري)</label><input id="nc-national" type="text" placeholder="12345678901234">
    <label>البريد الالكتروني (اختياري)</label><input id="nc-email" type="email" placeholder="ahmed@example.com">
    <button class="btn" onclick="createCustomer()">انشاء العميل</button>
  </div>
</div>

<div id="customer-detail" class="page" style="display:none">
  <div class="header">
    <h2 id="cd-title">تفاصيل العميل</h2>
    <button class="btn-sm" onclick="showView('customers')">رجوع</button>
  </div>
  <div id="cd-summary" class="summary-grid"></div>
  <div id="cd-debts"></div>
</div>

<div id="new-debt" class="page" style="display:none">
  <div class="header">
    <h2>➕ دين جديد</h2>
    <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
  </div>
  <div class="card" style="max-width:100%">
    <div id="debt-error" class="error"></div>
    <div id="debt-success" class="success" style="display:none"></div>
    <label>المبلغ (جنيه)</label><input id="d-principal" type="number" placeholder="10000">
    <label>نوع الجدول</label>
    <select id="d-type">
      <option value="FLAT_RATE">Flat Rate</option>
      <option value="DECLINING_BALANCE">Declining Balance</option>
      <option value="BALLOON">Bullet</option>
    </select>
    <label>معدل الفائدة السنوي (%)</label><input id="d-rate" type="number" placeholder="12">
    <label>مدة السداد (شهر)</label><input id="d-term" type="number" placeholder="12">
    <label>العملة</label>
    <select id="d-currency"><option value="EGP">EGP</option><option value="USD">USD</option></select>
    <button class="btn" onclick="createDebt()">انشاء الدين</button>
  </div>
</div>

<div id="statement" class="page" style="display:none">
  <div class="header">
    <h2>📋 كشف الحساب</h2>
    <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
  </div>
  <div id="statement-content"></div>
</div>

<div id="calc-waterfall" class="page" style="display:none">
  <div class="header">
    <h2>💧 توزيع دفعة</h2>
    <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
  </div>
  <div class="card" style="max-width:100%">
    <div id="wf-error" class="error"></div>
    <label>الدفعة (قرش)</label><input id="wf-payment" type="number" placeholder="100000">
    <label>غرامات (قرش)</label><input id="wf-penalties" type="number" placeholder="0">
    <label>فوائد (قرش)</label><input id="wf-interest" type="number" placeholder="5000">
    <label>اصل (قرش)</label><input id="wf-principal" type="number" placeholder="95000">
    <label>العملة</label><select id="wf-currency"><option value="EGP">EGP</option><option value="USD">USD</option></select>
    <button class="btn" onclick="calcWaterfall()">احسب</button>
    <div id="wf-result"></div>
  </div>
</div>

<div id="calc-interest" class="page" style="display:none">
  <div class="header">
    <h2>📈 حساب فائدة</h2>
    <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
  </div>
  <div class="card" style="max-width:100%">
    <div id="int-error" class="error"></div>
    <label>المبلغ الاصلي (قرش)</label><input id="int-principal" type="number" placeholder="1000000">
    <label>معدل الفائدة السنوي (%)</label><input id="int-rate" type="number" placeholder="12">
    <label>عدد الايام</label><input id="int-days" type="number" placeholder="30">
    <label>العملة</label><select id="int-currency"><option value="EGP">EGP</option><option value="USD">USD</option></select>
    <button class="btn" onclick="calcInterest()">احسب</button>
    <div id="int-result"></div>
  </div>
</div>

<div id="overdue" class="page" style="display:none">
  <div class="header">
    <h2 style="color:#ef4444">🔴 الاقساط المتاخرة</h2>
    <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
  </div>
  <div id="overdue-summary" class="summary-grid"></div>
  <div id="overdue-content"></div>
</div>

<div id="notifications" class="page" style="display:none">
  <div class="header">
    <h2>🔔 الاشعارات</h2>
    <div class="header-actions">
      <button class="btn-sm btn-blue" onclick="markAllRead()">قراءة الكل</button>
      <button class="btn-sm" onclick="showView('dashboard')">رجوع</button>
    </div>
  </div>
  <div id="notifications-content"></div>
</div>

<script>
const API = "http://localhost:3011";
let TOKEN = localStorage.getItem("token");
let _selectedCustomerId = null;

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + TOKEN },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

function showView(id) {
  ["login","dashboard","new-debt","statement","calc-waterfall","calc-interest",
   "overdue","customers","new-customer","customer-detail","notifications","analytics"]
    .forEach(v => document.getElementById(v).style.display = "none");
  document.getElementById(id).style.display = id === "login" ? "flex" : "block";
}

async function login() {
  document.getElementById("login-error").textContent = "";
  const data = await fetch(API + "/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("password").value })
  }).then(r => r.json());
  if (data.error) { document.getElementById("login-error").textContent = data.error; return; }
  TOKEN = data.token;
  localStorage.setItem("token", TOKEN);
  showView("dashboard");
  updateNotifBadge();
}

function logout() { localStorage.removeItem("token"); TOKEN = null; showView("login"); }

// ==================== ANALYTICS ====================

async function loadAnalytics() {
  showView("analytics");
  document.getElementById("analytics-content").innerHTML = '<p style="color:#94a3b8;text-align:center;padding:24px">جاري التحميل...</p>';
  const data = await api("GET", "/analytics/summary");
  const h = data.portfolioHealth;
  const forecast = data.cashflowForecast || [];

  const forecastTotal = forecast.reduce((sum, f) => sum + Number(f.expected_cents), 0);

  const forecastRows = forecast.map(f =>
    '<div class="forecast-row">' +
    '<span style="color:#94a3b8;font-size:13px">' + new Date(f.due_date).toLocaleDateString("ar-EG") + '</span>' +
    '<span style="font-size:13px">' + Number(f.installment_count) + ' قسط</span>' +
    '<span style="color:#38bdf8;font-weight:bold">' + (Number(f.expected_cents)/100).toFixed(0) + ' ج</span>' +
    '</div>'
  ).join("");

  document.getElementById("analytics-content").innerHTML =
    '<div class="summary-grid">' +
    '<div class="summary-item"><div class="val">' + h.total_debts + '</div><div class="lbl">اجمالي الديون</div></div>' +
    '<div class="summary-item"><div class="val" style="color:#22c55e">' + h.active_debts + '</div><div class="lbl">ديون نشطة</div></div>' +
    '<div class="summary-item"><div class="val" style="color:#ef4444">' + h.overdue_installments + '</div><div class="lbl">اقساط متاخرة</div></div>' +
    '<div class="summary-item"><div class="val">' + h.pending_installments + '</div><div class="lbl">اقساط قادمة</div></div>' +
    '</div>' +

    '<div class="stat-card">' +
    '<h3>صحة المحفظة</h3>' +
    '<div class="stat-row"><span class="stat-label">اجمالي الاصول</span><span class="stat-value">' + (Number(h.total_principal_cents)/100).toFixed(0) + ' ج</span></div>' +
    '<div class="stat-row"><span class="stat-label">اجمالي المتاخرات</span><span class="stat-value" style="color:#ef4444">' + (Number(h.overdue_amount_cents||0)/100).toFixed(0) + ' ج</span></div>' +
    '<div class="stat-row"><span class="stat-label">ديون مغلقة</span><span class="stat-value">' + h.closed_debts + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">ديون معاد هيكلتها</span><span class="stat-value" style="color:#f59e0b">' + h.restructured_debts + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">اقساط مدفوعة</span><span class="stat-value" style="color:#22c55e">' + h.paid_installments + '</span></div>' +
    '</div>' +

    '<div class="stat-card">' +
    '<h3>التدفق النقدي — 90 يوم القادمة</h3>' +
    '<div class="stat-row"><span class="stat-label">اجمالي المتوقع</span><span class="stat-value" style="color:#38bdf8">' + (forecastTotal/100).toFixed(0) + ' ج</span></div>' +
    '<div style="margin-top:12px">' + (forecastRows || '<p style="color:#94a3b8;font-size:13px;text-align:center">لا توجد اقساط قادمة</p>') + '</div>' +
    '</div>';
}

// ==================== CUSTOMERS ====================

async function loadCustomers() {
  showView("customers");
  const items = await api("GET", "/customers/portfolio");
  if (!items || items.error) { document.getElementById("customers-content").innerHTML = '<p class="error">خطا في التحميل</p>'; return; }
  if (items.length === 0) {
    document.getElementById("customers-content").innerHTML =
      '<div class="card" style="text-align:center;color:#94a3b8;padding:32px"><div style="font-size:48px;margin-bottom:12px">👥</div><p>لا يوجد عملاء بعد</p><button class="btn" style="margin-top:16px" onclick="showView(\'new-customer\')">+ اضف عميل</button></div>';
    return;
  }
  document.getElementById("customers-content").innerHTML = items.map(c =>
    '<div class="customer-card" onclick="loadCustomerDetail(\'' + c.customer_id + '\')">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
    '<div><b style="font-size:16px">' + c.name + '</b>' +
    '<div style="color:#94a3b8;font-size:13px;margin-top:2px">' + c.phone + '</div>' +
    '<div style="font-size:13px;margin-top:6px;color:#cbd5e1">' + c.debt_count + ' دين &nbsp;|&nbsp; اجمالي: <b>' + (c.total_principal_cents/100).toFixed(0) + ' ج</b></div>' +
    (Number(c.overdue_installments) > 0 ? '<div class="overdue-tag">⚠ ' + c.overdue_installments + ' قسط متاخر — ' + (c.overdue_amount_cents/100).toFixed(0) + ' ج</div>' : '') +
    '</div><span style="color:#475569;font-size:20px">&#8592;</span></div></div>'
  ).join("");
}

async function loadCustomerDetail(id) {
  showView("customer-detail");
  const [data, portfolio] = await Promise.all([api("GET", "/customers/" + id), api("GET", "/customers/portfolio")]);
  if (data.error) return;
  const c = data.customer;
  const p = portfolio.find(x => x.customer_id === id) || {};
  document.getElementById("cd-title").textContent = c.name;
  document.getElementById("cd-summary").innerHTML =
    '<div class="summary-item"><div class="val">' + (p.debt_count||0) + '</div><div class="lbl">عدد الديون</div></div>' +
    '<div class="summary-item"><div class="val">' + ((p.total_principal_cents||0)/100).toFixed(0) + '</div><div class="lbl">اجمالي الاصل (ج)</div></div>' +
    '<div class="summary-item"><div class="val" style="color:#ef4444">' + ((p.overdue_amount_cents||0)/100).toFixed(0) + '</div><div class="lbl">المتاخر (ج)</div></div>' +
    '<div class="summary-item"><div class="val" style="color:#ef4444">' + (p.overdue_installments||0) + '</div><div class="lbl">اقساط متاخرة</div></div>';
  const debtsHtml = !data.debts || data.debts.length === 0
    ? '<p style="color:#94a3b8;text-align:center;padding:16px">لا توجد ديون</p>'
    : data.debts.map(d =>
      '<div class="debt-card"><div><b>' + (d.principal_cents/100).toFixed(0) + ' ج</b>' +
      '<span style="color:#94a3b8;font-size:12px"> — ' + d.amort_type + ' — ' + d.annual_rate_bps/100 + '% — ' + d.term_months + ' شهر</span>' +
      '<div style="font-size:11px;color:#475569;margin-top:2px">' + new Date(d.created_at).toLocaleDateString("ar-EG") + '</div></div>' +
      '<span class="badge badge-' + d.status.toLowerCase() + '">' + d.status + '</span></div>'
    ).join("");
  document.getElementById("cd-debts").innerHTML =
    '<div class="card" style="max-width:100%">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
    '<h3 style="color:#f1f5f9">الديون</h3>' +
    '<button class="btn-sm btn-blue" onclick="startNewDebtForCustomer(\'' + id + '\')">+ دين جديد</button></div>' +
    debtsHtml + '</div>';
}

function startNewDebtForCustomer(customerId) { _selectedCustomerId = customerId; showView("new-debt"); }

async function createCustomer() {
  document.getElementById("nc-error").textContent = "";
  const name = document.getElementById("nc-name").value.trim();
  const phone = document.getElementById("nc-phone").value.trim();
  const nationalId = document.getElementById("nc-national").value.trim();
  const email = document.getElementById("nc-email").value.trim();
  if (!name || !phone) { document.getElementById("nc-error").textContent = "الاسم والهاتف مطلوبان"; return; }
  const data = await api("POST", "/customers", { name, phone, nationalId, email });
  if (data.error) { document.getElementById("nc-error").textContent = data.error; return; }
  document.getElementById("nc-name").value = "";
  document.getElementById("nc-phone").value = "";
  document.getElementById("nc-national").value = "";
  document.getElementById("nc-email").value = "";
  loadCustomers();
}

// ==================== DEBTS ====================

async function createDebt() {
  document.getElementById("debt-error").textContent = "";
  document.getElementById("debt-success").style.display = "none";
  const userId = JSON.parse(atob(TOKEN.split('.')[1])).userId;
  const data = await api("POST", "/debts", {
    userId, customerId: _selectedCustomerId,
    principalCents: Number(document.getElementById("d-principal").value) * 100,
    amortType:      document.getElementById("d-type").value,
    annualRateBps:  Number(document.getElementById("d-rate").value) * 100,
    termMonths:     Number(document.getElementById("d-term").value),
    currency:       document.getElementById("d-currency").value,
  });
  if (data.error) { document.getElementById("debt-error").textContent = data.error; return; }
  document.getElementById("debt-success").style.display = "block";
  document.getElementById("debt-success").textContent = "تم انشاء الدين بنجاح — " + data.schedule.length + " قسط";
  _selectedCustomerId = null;
}

// ==================== STATEMENT ====================

async function loadStatement() {
  showView("statement");
  const userId = JSON.parse(atob(TOKEN.split('.')[1])).userId;
  const data = await api("GET", "/statement/" + userId);
  if (data.error) { document.getElementById("statement-content").innerHTML = '<p class="error">' + data.error + '</p>'; return; }
  const s = data.summary;
  const debtsHtml = (data.debts||[]).map(d =>
    '<div class="debt-card"><div><b>' + (d.principalCents/100).toFixed(0) + ' جنيه</b>' +
    '<span style="color:#94a3b8;font-size:12px"> — ' + d.amortType + ' — ' + d.annualRateBps/100 + '% — ' + d.termMonths + ' شهر</span></div>' +
    '<span class="badge badge-' + d.status.toLowerCase() + '">' + d.status + '</span></div>'
  ).join("");
  document.getElementById("statement-content").innerHTML =
    '<div class="summary-grid">' +
    '<div class="summary-item"><div class="val">' + s.totalDebts + '</div><div class="lbl">اجمالي الديون</div></div>' +
    '<div class="summary-item"><div class="val">' + s.activeDebts + '</div><div class="lbl">ديون نشطة</div></div>' +
    '<div class="summary-item"><div class="val">' + (s.totalPrincipalCents/100).toFixed(0) + '</div><div class="lbl">اجمالي الاصول (ج)</div></div>' +
    '<div class="summary-item"><div class="val">' + (s.remainingBalance/100).toFixed(0) + '</div><div class="lbl">الرصيد المتبقي (ج)</div></div></div>' +
    '<div class="card" style="max-width:100%"><h3 style="margin-bottom:12px;color:#f1f5f9">الديون</h3>' + debtsHtml + '</div>';
}

// ==================== CALCULATORS ====================

async function calcWaterfall() {
  document.getElementById("wf-error").textContent = "";
  const data = await api("POST", "/calculate/waterfall", {
    paymentCents:   Number(document.getElementById("wf-payment").value),
    penaltiesCents: Number(document.getElementById("wf-penalties").value),
    interestCents:  Number(document.getElementById("wf-interest").value),
    principalCents: Number(document.getElementById("wf-principal").value),
    currency:       document.getElementById("wf-currency").value,
  });
  if (data.error) { document.getElementById("wf-error").textContent = data.error; return; }
  const a = data.allocated;
  document.getElementById("wf-result").innerHTML =
    '<div style="margin-top:16px;background:#0f172a;border-radius:8px;padding:16px">' +
    '<p style="margin-bottom:8px">🔴 غرامات: <b>' + (a.penalties/100).toFixed(2) + ' ج</b></p>' +
    '<p style="margin-bottom:8px">🟡 فوائد: <b>' + (a.interest/100).toFixed(2) + ' ج</b></p>' +
    '<p style="margin-bottom:8px">🟢 اصل: <b>' + (a.principal/100).toFixed(2) + ' ج</b></p>' +
    '<p>⚪ باقي: <b>' + (a.remaining/100).toFixed(2) + ' ج</b></p></div>';
}

async function calcInterest() {
  document.getElementById("int-error").textContent = "";
  const data = await api("POST", "/calculate/interest", {
    principalCents: Number(document.getElementById("int-principal").value),
    annualRateBps:  Number(document.getElementById("int-rate").value) * 100,
    days:           Number(document.getElementById("int-days").value),
    currency:       document.getElementById("int-currency").value,
  });
  if (data.error) { document.getElementById("int-error").textContent = data.error; return; }
  document.getElementById("int-result").innerHTML =
    '<div style="margin-top:16px;background:#0f172a;border-radius:8px;padding:16px;text-align:center">' +
    '<div style="font-size:32px;color:#38bdf8;font-weight:bold">' + data.display + '</div>' +
    '<div style="color:#94a3b8;font-size:13px;margin-top:4px">' + data.interestCents + ' قرش</div></div>';
}

// ==================== OVERDUE ====================

async function loadOverdue() {
  showView("overdue");
  const [summary, items] = await Promise.all([api("GET", "/dashboard/overdue-summary"), api("GET", "/dashboard/overdue")]);
  document.getElementById("overdue-summary").innerHTML =
    '<div class="summary-item"><div class="val" style="color:#ef4444">' + summary.overdue_count + '</div><div class="lbl">اقساط متاخرة</div></div>' +
    '<div class="summary-item"><div class="val" style="color:#ef4444">' + (summary.overdue_amount_cents/100).toFixed(0) + '</div><div class="lbl">اجمالي المتاخر (ج)</div></div>' +
    '<div class="summary-item"><div class="val">' + summary.average_days_late + '</div><div class="lbl">متوسط التاخير (يوم)</div></div>' +
    '<div class="summary-item"><div class="val">' + summary.max_days_late + '</div><div class="lbl">اقصى تاخير (يوم)</div></div>';
  const rows = items.map(i =>
    '<tr><td>' + i.installment_number + '</td><td>' + new Date(i.due_date).toLocaleDateString("ar-EG") + '</td>' +
    '<td style="color:#ef4444;font-weight:bold">' + i.days_late + ' يوم</td>' +
    '<td>' + (i.total_payment_cents/100).toFixed(0) + ' ج</td>' +
    '<td>' + (i.remaining_balance_cents/100).toFixed(0) + ' ج</td>' +
    '<td style="color:#94a3b8;font-size:11px">' + i.user_id + '</td></tr>'
  ).join("");
  document.getElementById("overdue-content").innerHTML =
    '<div class="card" style="max-width:100%;overflow-x:auto"><table>' +
    '<thead><tr><th>#</th><th>الاستحقاق</th><th>التاخير</th><th>القسط</th><th>المتبقي</th><th>العميل</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>';
}

// ==================== NOTIFICATIONS ====================

async function updateNotifBadge() {
  try {
    const data = await api("GET", "/notifications/unread-count");
    const badge = document.getElementById("notif-badge");
    if (data.count > 0) { badge.style.display = "block"; badge.textContent = data.count > 9 ? "9+" : data.count; }
    else { badge.style.display = "none"; }
  } catch(e) {}
}

async function loadNotifications() {
  showView("notifications");
  const items = await api("GET", "/notifications");
  if (!items || items.length === 0) {
    document.getElementById("notifications-content").innerHTML =
      '<div class="card" style="text-align:center;color:#94a3b8;padding:32px"><div style="font-size:48px;margin-bottom:12px">🔔</div><p>لا توجد اشعارات</p></div>';
    return;
  }
  document.getElementById("notifications-content").innerHTML = items.map(n =>
    '<div class="notif-item ' + (n.is_read ? 'read' : '') + '" id="notif-' + n.id + '" onclick="markRead(\'' + n.id + '\')">' +
    '<div class="notif-title">' + (n.is_read ? '' : '<span class="new-tag">جديد</span>') + n.title + '</div>' +
    '<div class="notif-body">' + n.body + '</div>' +
    '<div class="notif-date">' + new Date(n.created_at).toLocaleDateString("ar-EG") + '</div></div>'
  ).join("");
  updateNotifBadge();
}

async function markRead(id) {
  await api("PATCH", "/notifications/" + id + "/read");
  const el = document.getElementById("notif-" + id);
  if (el) { el.classList.add("read"); const tag = el.querySelector(".new-tag"); if (tag) tag.remove(); }
  updateNotifBadge();
}

async function markAllRead() { await api("PATCH", "/notifications/read-all"); loadNotifications(); }

if (TOKEN) { showView("dashboard"); updateNotifBadge(); }
</script>
</body>
</html>
