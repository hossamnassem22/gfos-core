<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-sm w-full max-w-sm border-t-4 border-blue-600">
        <h2 class="text-lg font-bold mb-4">بوابة تسجيل الدخول</h2>
        <form id="f" class="space-y-4">
            <input type="email" id="e" placeholder="البريد" class="w-full p-2 border rounded" required>
            <input type="password" id="p" placeholder="كلمة المرور" class="w-full p-2 border rounded" required>
            <button class="w-full bg-blue-600 text-white p-2 rounded">دخول</button>
        </form>
        <!-- منطقة عرض الأخطاء الذكية -->
        <div id="msg" class="mt-4 hidden p-3 text-sm rounded bg-red-50 text-red-700 border border-red-200"></div>
    </div>

    <script>
        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: document.getElementById('e').value, password: document.getElementById('p').value})
            });
            const data = await res.json();
            if(data.success) {
                window.location.href = '/dashboard';
            } else {
                msg.innerText = data.error; // عرض رسالة الخطأ المحددة من السيرفر
                msg.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
